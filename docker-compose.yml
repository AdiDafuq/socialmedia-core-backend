
services:
  postgres:
    image: postgres:15
    container_name: socialmedia-postgres
    restart: always
    environment:
      POSTGRES_DB: socialmedia
      POSTGRES_USER: socialuser
      POSTGRES_PASSWORD: socialpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    container_name: socialmedia-redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend-network

volumes:
  postgres_data:
  redis_data:

networks:
  backend-network:
    driver: bridge